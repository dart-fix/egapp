*{margin:0;padding:0;box-sizing:border-box}
body.prd-mode{background:#0F172A;font-family:'Inter',sans-serif;min-height:100vh;justify-content:center;align-items:flex-start}
.prd-workspace{display:flex;gap:20px;margin:0 auto;align-items:flex-start;justify-content:center;width:auto;max-width:100%}
.admin-shell{flex:1;min-width:0;background:#F1F5F9;overflow:hidden;box-shadow:0 30px 60px rgba(0,0,0,.4);display:flex;height:calc(100vh - 0px);}

.admin-logo{padding:20px 18px;border-bottom:1px solid #E2E8F0}

.admin-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-group{font-size:10px;color:#94A3B8;text-transform:uppercase;padding:12px 12px 6px;font-weight:700;letter-spacing:.5px}
.nav-link{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;font-size:13px;font-weight:500;color:#475569;cursor:pointer;margin-bottom:2px;transition:.15s}
.nav-link i{width:18px;text-align:center;font-size:14px}

.admin-main{flex:1;display:flex;flex-direction:column;min-width:0}
.admin-topbar{background:#fff;padding:14px 24px;border-bottom:1px solid #E2E8F0;display:flex;justify-content:space-between;align-items:center}
.admin-topbar h1{font-size:18px;font-weight:700;color:#1C2E36}

.topbar-actions{display:flex;gap:10px;align-items:center}

.topbar-btn.primary{background:linear-gradient(95deg,#1A4A6E,#22668D);color:#fff}
.admin-content{flex:1;overflow-y:auto;padding:20px 24px}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:14px;padding:18px;border:1px solid #E2E8F0;cursor:pointer;transition:.15s}

.stat-card .trend{font-size:11px;color:#1D7A6E;margin-top:8px;font-weight:600}
.panel{background:#fff;border-radius:14px;border:1px solid #E2E8F0;margin-bottom:20px;overflow:hidden}
.panel-head{padding:16px 20px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center}
.panel-head h3{font-size:15px;font-weight:700;color:#1C2E36}
.panel-head a{font-size:12px;color:#22668D;text-decoration:none;font-weight:600;cursor:pointer}
.panel-body{padding:16px 20px}
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:10px 12px;background:#F8FAFC;color:#64748B;font-weight:600;font-size:11px;text-transform:uppercase;border-bottom:1px solid #E2E8F0}
.data-table td{padding:12px;border-bottom:1px solid #F1F5F9;color:#334155}
.data-table tr{cursor:pointer}.data-table tr:hover td{background:#F8FAFE}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-green{background:#D4EDE8;color:#1D7A6E}.badge-yellow{background:#FEF3C7;color:#B45309}
.badge-blue{background:#DBEAFE;color:#1D4ED8}.badge-red{background:#FEE2E2;color:#B91C1C}
.badge-gray{background:#F1F5F9;color:#64748B}
.btn-sm{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;border:none;cursor:pointer}
.btn-primary{background:#22668D;color:#fff}.btn-secondary{background:#F1F5F9;color:#475569}
.btn-danger{background:#FEE2E2;color:#B91C1C}
.filter-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{padding:8px 12px;border:1px solid #E2E8F0;border-radius:8px;font-size:13px;background:#fff;font-family:inherit}
.filter-bar input{min-width:200px}
.chart-placeholder{height:200px;background:linear-gradient(180deg,#EFF6FF 0%,#fff 100%);border-radius:12px;display:flex;align-items:flex-end;justify-content:space-around;padding:0 20px 20px}
.chart-bar{width:32px;background:linear-gradient(180deg,#22668D,#1A4A6E);border-radius:6px 6px 0 0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#64748B;margin-bottom:6px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #E2E8F0;border-radius:8px;font-size:13px;font-family:inherit}
.form-group textarea{min-height:80px;resize:vertical}
.modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:500;display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:16px;width:520px;max-width:90vw;max-height:85vh;overflow-y:auto;box-shadow:0 25px 50px rgba(0,0,0,.25)}
.modal-head{padding:18px 22px;border-bottom:1px solid #F1F5F9;display:flex;justify-content:space-between;align-items:center}
.modal-head h2{font-size:17px;font-weight:700}
.modal-close{width:32px;height:32px;border-radius:8px;background:#F1F5F9;border:none;cursor:pointer;font-size:16px;color:#64748B}
.modal-body{padding:20px 22px 24px}
.modal-foot{padding:14px 22px;border-top:1px solid #F1F5F9;display:flex;gap:10px;justify-content:flex-end}
.tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid #E2E8F0;padding-bottom:0}
.tab-btn{padding:10px 16px;border:none;background:none;font-size:13px;font-weight:600;color:#64748B;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab-btn.on{color:#22668D;border-bottom-color:#22668D}
.prd-sidebar{width:400px;min-width:340px;max-height:calc(100vh - 32px);background:#FFF;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.35);display:none;flex-direction:column;overflow:hidden;position:sticky;top:16px;flex-shrink:0}
.prd-sidebar-header{background:linear-gradient(135deg,#1E3A5F,#22668D);color:#fff;padding:16px 18px}
.prd-sidebar-header h1{font-size:15px;font-weight:800;margin-bottom:4px}
.prd-sidebar-header p{font-size:11px;opacity:.85;line-height:1.5}
.prd-badge-row{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.prd-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:rgba(255,255,255,.2)}
.prd-sidebar-body{flex:1;overflow-y:auto;padding:16px 18px 24px}
.prd-empty{text-align:center;padding:40px 16px;color:#94A3B8}
.prd-empty i{font-size:32px;margin-bottom:10px;display:block;color:#CBD5E1}
.prd-empty p{font-size:12px;line-height:1.7}
.prd-section{margin-bottom:14px}
.prd-section-title{font-size:11px;font-weight:700;color:#64748B;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.prd-section-title::before{content:"";width:3px;height:12px;background:#22668D;border-radius:2px}
.prd-title{font-size:17px;font-weight:800;color:#0F172A;margin-bottom:6px}
.prd-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.prd-meta-tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:20px}
.prd-meta-module{background:#EFF6FF;color:#1D4ED8}.prd-meta-p0{background:#FEE2E2;color:#B91C1C}
.prd-meta-p1{background:#FEF3C7;color:#B45309}.prd-meta-page{background:#F1F5F9;color:#475569}
.prd-business-text,.prd-logic-item{font-size:12px;color:#334155;line-height:1.7;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:10px;padding:10px 12px;margin-bottom:6px}
.prd-logic-item strong{display:block;color:#22668D;margin-bottom:3px;font-size:11px}
.prd-list{list-style:none}.prd-list li{font-size:11px;color:#334155;line-height:1.6;padding:5px 0 5px 16px;position:relative;border-bottom:1px solid #F1F5F9}
.prd-list li::before{content:"✓";position:absolute;left:0;color:#22668D;font-weight:700;font-size:10px}
.prd-api-box{background:#0F172A;color:#E2E8F0;border-radius:8px;padding:10px;font-size:10px;font-family:Consolas,monospace}
.prd-highlight{outline:2px solid #F59E0B!important;outline-offset:2px;background:rgba(245,158,11,.08)!important}
.prd-pending{outline:2px dashed #94A3B8!important;animation:prd-pulse 1s infinite}
@keyframes prd-pulse{0%,100%{outline-color:#94A3B8}50%{outline-color:#64748B}}
.prd-tooltip{position:fixed;z-index:99999;pointer-events:none;background:#1E293B;color:#fff;font-size:11px;padding:6px 10px;border-radius:8px;opacity:0;transition:opacity .15s}
.prd-tooltip.show{opacity:1}
.prd-mode-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(30,58,95,.95);color:#fff;padding:8px 20px;border-radius:30px;font-size:12px;font-weight:600;z-index:99998}
.sp-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(30,50,70,.92);color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;z-index:600;display:none}
.sp-toast.show{display:block}
@media(max-width:1200px){.stat-grid{grid-template-columns:repeat(2,1fr)}.form-grid{grid-template-columns:1fr}}
@media(max-width:900px){body.prd-mode{flex-direction:column}.prd-workspace{flex-direction:column;align-items:center}.admin-shell{height:auto;min-height:600px;max-width:100%}.prd-sidebar{width:100%;max-width:100%;position:relative;max-height:40vh}}
</style>
</head>

function loadModule(id){
currentModule=id;
const m=MODULES[id];if(!m)return;
pageTitle.textContent=m.title;pageSubtitle.textContent=m.subtitle;
adminContent.innerHTML=m.render();
document.querySelectorAll('.nav-link').forEach(n=>n.classList.toggle('active',n.dataset.module===id));
bindContentEvents();
}

function bindContentEvents(){
adminContent.querySelectorAll('[data-action]').forEach(el=>{
el.addEventListener('click',e=>{e.stopPropagation();handleAction(el.dataset.action,e)});
});
adminContent.querySelectorAll('tr[data-action]').forEach(tr=>{
tr.addEventListener('click',()=>handleAction(tr.dataset.action));
});
adminContent.querySelectorAll('.tab-btn').forEach(btn=>{
btn.addEventListener('click',()=>{
btn.parentElement.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('on'));
btn.classList.add('on');
if(currentModule==='content'){
const cat=btn.dataset.tab;
adminContent.querySelectorAll('[data-cat]').forEach(row=>{
row.style.display=(cat==='all'||row.dataset.cat===cat)?'':'none';
});
}
});
});
}

function initPRD(){
const prdEmpty=document.getElementById('prdEmpty'),prdContent=document.getElementById('prdContent'),prdTooltip=document.getElementById('prdTooltip');
let activeEl=null,hoverTimer=null,pendingEl=null;
function renderPanel(spec){
prdEmpty.style.display='none';prdContent.style.display='block';
prdContent.innerHTML=`<div class="prd-section"><div class="prd-title">${spec.title}</div><div class="prd-meta"><span class="prd-meta-tag prd-meta-module">${spec.module}</span><span class="prd-meta-tag prd-meta-p0">${spec.priority}</span><span class="prd-meta-tag prd-meta-page">${spec.page}</span></div></div>
<div class="prd-section"><div class="prd-section-title">① 业务需求</div><div class="prd-business-text">${spec.business}</div></div>
<div class="prd-section"><div class="prd-section-title">② 功能详细逻辑</div>${(spec.logic||[]).map(l=>`<div class="prd-logic-item">${l}</div>`).join('')}</div>
<div class="prd-section"><div class="prd-section-title">③ 验收标准</div><ul class="prd-list">${(spec.acceptance||[]).map(a=>`<li>${a}</li>`).join('')}</ul></div>
${spec.api?`<div class="prd-section"><div class="prd-section-title">接口</div><div class="prd-api-box">${spec.api}</div></div>`:''}`;
}
function bindSpecs(){
document.querySelectorAll('.nav-link,.stat-card,.btn-sm,.topbar-btn,.panel-head a,tr,[data-action]').forEach(el=>{
if(el._prdBound)return;el._prdBound=true;
let specId=null;
PRD_MAP.forEach(m=>{if(el.matches(m.sel))specId=m.id});
if(el.dataset.action==='rate-approve'||el.dataset.action==='rate-reject')specId='rate-approval';
if(el.dataset.action==='inst-approve')specId='inst-approve';
if(el.dataset.action==='order-detail')specId='order-detail-modal';
if(el.dataset.action==='confirm-settle')specId='settle-confirm';
const spec=specId&&PRD_SPECS[specId];
if(!spec)return;
el.addEventListener('mouseenter',()=>{
if(hoverTimer)clearTimeout(hoverTimer);
if(pendingEl)pendingEl.classList.remove('prd-pending');
pendingEl=el;el.classList.add('prd-pending');
hoverTimer=setTimeout(()=>{el.classList.remove('prd-pending');if(activeEl&&activeEl!==el)activeEl.classList.remove('prd-highlight');activeEl=el;el.classList.add('prd-highlight');renderPanel(spec);prdTooltip.textContent=spec.title;prdTooltip.classList.add('show')},1000);
});
el.addEventListener('mouseleave',()=>{if(hoverTimer)clearTimeout(hoverTimer);if(pendingEl===el){el.classList.remove('prd-pending');pendingEl=null}prdTooltip.classList.remove('show')});
});
}
new MutationObserver(()=>bindSpecs()).observe(document.body,{childList:true,subtree:true});
bindSpecs();
}
loadModule('dashboard');
initPRD();
document.getElementById('modalOverlay').addEventListener('click',e=>{
if(e.target.dataset&&e.target.dataset.quick){closeModal();handleAction(e.target.dataset.quick)}
});
})();
