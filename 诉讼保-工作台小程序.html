function setActiveNav(id){
currentNav=id;
document.querySelectorAll('.nav-item').forEach(n=>{n.classList.toggle('active',n.dataset.nav===id)});
tabContent.innerHTML=TABS[id]||'';
scroll.scrollTop=0;
bindTabClicks();
if(id==='profile')bindNotifySwitch();
}

function bindTabClicks(){
document.querySelectorAll('[data-page]').forEach(el=>{
if(el._bound)return;el._bound=true;el.style.cursor='pointer';
el.addEventListener('click',e=>{
e.stopPropagation();
const pg=el.dataset.page,flt=el.dataset.filter;
if(flt)currentOrderFilter=flt;
if(pg)openSubPage(pg);
});
});
document.querySelectorAll('.stat-item[data-page],.stat-block[data-page]').forEach(el=>{
if(el._bound)return;el._bound=true;el.addEventListener('click',()=>{if(el.dataset.filter)currentOrderFilter=el.dataset.filter;openSubPage(el.dataset.page||'orderList')});
});
document.querySelectorAll('.order-card[data-page]').forEach(el=>{
if(el._bound)return;el._bound=true;el.addEventListener('click',()=>openSubPage('orderDetail'));
});
const filters=document.getElementById('orderFilters');
if(filters&&!filters._bound){
filters._bound=true;
filters.querySelectorAll('button').forEach(btn=>{
btn.addEventListener('click',()=>{
filters.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
btn.classList.add('on');
const f=btn.dataset.filter;
document.querySelectorAll('#orderListArea .order-card').forEach(card=>{
card.style.display=(f==='all'||card.dataset.status===f)?'':'none';
});
});
});
}
}

function bindNotifySwitch(){
const sw=document.getElementById('notifySwitch');
if(sw&&!sw._bound){sw._bound=true;sw.addEventListener('click',e=>{e.stopPropagation();sw.classList.toggle('active')})}
}

function bindSubEvents(id){
subBody.querySelectorAll('[data-page]').forEach(el=>{
el.addEventListener('click',e=>{e.stopPropagation();openSubPage(el.dataset.page)});
});
subBody.querySelectorAll('[data-action]').forEach(btn=>{
btn.addEventListener('click',()=>{
const act=btn.dataset.action,msg=btn.dataset.msg;
if(act==='toast'&&msg)showToast(msg);
if(act==='approve-order'){showToast('审核通过，订单进入待出函');setTimeout(()=>openSubPage('issueGuarantee'),800)}
if(act==='reject-order'){showToast('订单已驳回，已通知申请人');setTimeout(closeSubPage,800)}
if(act==='issue-letter'){showToast('保函已出具并上链存证');ORDER_STATE.status='done';setTimeout(closeSubPage,1000)}
if(act==='send-supplement'){showToast('补材料通知已发送');setTimeout(closeSubPage,800)}
});
});
subBody.querySelectorAll('.sp-tag[data-select]').forEach(tag=>{
tag.addEventListener('click',()=>{tag.parentElement.querySelectorAll('.sp-tag').forEach(t=>t.classList.remove('selected'));tag.classList.add('selected')});
});
const filtersSub=document.getElementById('orderFiltersSub');
if(filtersSub){
filtersSub.querySelectorAll('button').forEach(btn=>{
btn.addEventListener('click',()=>{
filtersSub.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
btn.classList.add('on');
const f=btn.dataset.filter;
document.querySelectorAll('#orderListArea .order-card').forEach(card=>{
card.style.display=(f==='all'||card.dataset.status===f)?'':'none';
});
});
});
}
}

document.querySelectorAll('.nav-item').forEach(nav=>{
nav.addEventListener('click',()=>{closeSubPage();setActiveNav(nav.dataset.nav)});
});
document.getElementById('subpageBack').addEventListener('click',closeSubPage);

function initPRD(){
const prdEmpty=document.getElementById('prdEmpty'),prdContent=document.getElementById('prdContent'),prdTooltip=document.getElementById('prdTooltip'),prdPendingHint=document.getElementById('prdPendingHint');
let activeEl=null,hoverTimer=null,pendingEl=null;
function renderPanel(spec){
prdEmpty.style.display='none';prdContent.style.display='block';
prdContent.innerHTML=`<div class="prd-section"><div class="prd-title">${spec.title}</div><div class="prd-meta"><span class="prd-meta-tag prd-meta-module">${spec.module}</span><span class="prd-meta-tag prd-meta-p0">${spec.priority}</span><span class="prd-meta-tag prd-meta-page">${spec.page}</span></div></div>
<div class="prd-section"><div class="prd-section-title">① 业务需求</div><div class="prd-business-text">${spec.business}</div></div>
<div class="prd-section"><div class="prd-section-title">② 功能详细逻辑</div>${(spec.logic||[]).map(l=>`<div class="prd-logic-item">${l}</div>`).join('')}</div>
<div class="prd-section"><div class="prd-section-title">③ 验收标准</div><ul class="prd-list">${(spec.acceptance||[]).map(a=>`<li>${a}</li>`).join('')}</ul></div>
${spec.api?`<div class="prd-section"><div class="prd-section-title">接口</div><div class="prd-api-box">${spec.api}</div></div>`:''}`;
}
function bindSpecs(){
document.querySelectorAll('button,.nav-item,.stat-item,.stat-block,.quick-item,.order-card,.alert-banner,.icon-btn,.settings-item,.sp-btn-primary,.sp-btn-secondary,.sp-btn-danger,[data-page]').forEach(el=>{
if(el._prdBound)return;el._prdBound=true;
let specId=null;
ELEMENT_MAP.forEach(m=>{if(el.matches(m.sel)||el.closest(m.sel))specId=m.id});
if(!specId&&el.dataset&&el.dataset.page)specId=el.dataset.page.replace(/([A-Z])/g,'-$1').toLowerCase().replace(/^-/,'');
const spec=specId&&PRD_SPECS[specId];
if(!spec)return;
el.addEventListener('mouseenter',()=>{
if(hoverTimer)clearTimeout(hoverTimer);
if(pendingEl)pendingEl.classList.remove('prd-pending');
pendingEl=el;el.classList.add('prd-pending');
hoverTimer=setTimeout(()=>{el.classList.remove('prd-pending');if(activeEl&&activeEl!==el)activeEl.classList.remove('prd-highlight');activeEl=el;el.classList.add('prd-highlight');renderPanel(spec);prdTooltip.textContent=spec.title;prdTooltip.classList.add('show')},1000);
});
el.addEventListener('mouseleave',()=>{if(hoverTimer)clearTimeout(hoverTimer);if(pendingEl===el){el.classList.remove('prd-pending');pendingEl=null}prdTooltip.classList.remove('show')});
});
}
const obs=new MutationObserver(()=>bindSpecs());
obs.observe(document.body,{childList:true,subtree:true});
bindSpecs();
}
setActiveNav('workbench');
initPRD();
})();
